name: CLI Check

on:
  push:
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/cli-check.yml'
  pull_request:
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/cli-check.yml'

jobs:
  cli-test:
    runs-on: ubuntu-latest
    env:
      FRITZ_IP: 192.168.178.1
      FRITZ_USER: fritz1234
      FRITZ_PASS: dummy_password
      FRITZ_DEFAULT_RULE_ID: rub_1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          source .venv/bin/activate
          cd $GITHUB_WORKSPACE
          flake8 .

      - name: Run unit tests (pytest)
        run: |
          source .venv/bin/activate
          pytest || true

      - name: Check CLI help for fritzbox_call_forwarding.py
        run: |
          source .venv/bin/activate
          python fritzbox_call_forwarding.py --help

      - name: Check CLI help for fritzbox_user_list.py
        run: |
          source .venv/bin/activate
          python fritzbox_user_list.py --help